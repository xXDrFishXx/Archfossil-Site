<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment Received — Archfossil TTRPG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/Home Icon Round.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Lora', Georgia, serif;
            color: #dce8d8;
            background: #0b0f0b;
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        h1, h2 { font-family: 'Cinzel', serif; color: #7aad75; }
        .success-card {
            max-width: 550px;
            background: #1a241a;
            border: 1px solid #2b3a2b;
            border-radius: 8px;
            padding: 3rem 2.5rem;
        }
        .success-icon { font-size: 3.5rem; margin-bottom: 1rem; }
        .success-card h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .success-card p { color: #8a9e86; margin-bottom: 1.5rem; }
        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            border-radius: 4px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            text-decoration: none;
            background: #527a4e;
            color: #fff;
            transition: transform 0.2s, background 0.2s;
        }
        .btn:hover { transform: translateY(-2px); background: #7aad75; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">&#9878;</div>
        <h1>You're Enrolled!</h1>
        <p>Your request to join the Archfossil mail-in campaign has been received. We'll be in touch soon with your first dispatch from The Riven Lands.</p>
        <a href="/" class="btn">Return to Homepage</a>
    </div>
</body>
</html>
